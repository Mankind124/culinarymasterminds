# Cloudflare Pages config for Culinary Masterminds
#
# This project is a static site (no build step) with Cloudflare Pages Functions
# in the /functions folder. You can deploy two ways:
#
#   1. Connect this repo to Cloudflare Pages via the dashboard (recommended)
#      Build command:        (leave empty)
#      Build output directory: /
#      Then: bind D1 database "DB" and add ADMIN_PASSWORD + SESSION_SECRET secrets.
#
#   2. Deploy via Wrangler CLI (requires Node.js):
#         npm install -g wrangler
#         wrangler login
#         wrangler d1 create culinarymasterminds-db
#         # paste the database_id below into [[d1_databases]]
#         wrangler d1 execute culinarymasterminds-db --remote --file=./schema.sql
#         wrangler pages secret put ADMIN_PASSWORD --project-name culinarymasterminds
#         wrangler pages secret put SESSION_SECRET --project-name culinarymasterminds
#         wrangler pages deploy . --project-name culinarymasterminds

name = "culinarymasterminds"
compatibility_date = "2025-01-01"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "culinarymasterminds-db"
database_id = "REPLACE_WITH_DATABASE_ID_AFTER_CREATING_D1"

# Non-secret env vars (you can also set these in the Pages dashboard)
[vars]
# ADMIN_EMAIL = "culinarymasterminds@gmail.com"
# NOTIFY_WEBHOOK = "https://discord.com/api/webhooks/..." # optional

# Secrets — DO NOT put real values here. Set them via:
#   wrangler pages secret put ADMIN_PASSWORD --project-name culinarymasterminds
#   wrangler pages secret put SESSION_SECRET --project-name culinarymasterminds
# or via the Cloudflare dashboard under Pages → Settings → Environment variables.
