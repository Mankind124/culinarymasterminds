<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gallery — Culinary Masterminds Admin</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23b8736f'/%3E%3Ctext x='50' y='66' font-family='Georgia,serif' font-size='52' fill='%23fffaf3' text-anchor='middle'%3ECM%3C/text%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/styles.css" />
<style>
  .uploader {
    border: 2px dashed var(--rose-soft);
    border-radius: 6px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    background: var(--cream);
    transition: background .2s, border-color .2s;
    cursor: pointer;
    margin-bottom: 1.5rem;
  }
  .uploader.drag { background: var(--ivory); border-color: var(--rose-deep); }
  .uploader p { margin: .5rem 0; color: var(--muted); }
  .uploader strong { color: var(--rose-deep); }
  .uploader input[type=file] { display: none; }

  .gallery-admin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.25rem;
  }
  .g-tile {
    background: var(--ivory);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .g-tile .thumb {
    aspect-ratio: 4/5;
    background: var(--cream) center/cover no-repeat;
    position: relative;
  }
  .g-tile .thumb .order {
    position: absolute;
    top: .5rem; left: .5rem;
    background: rgba(26,22,20,0.85);
    color: var(--ivory);
    font-size: .7rem;
    padding: .25rem .5rem;
    border-radius: 99px;
    letter-spacing: .1em;
  }
  .g-tile .meta {
    padding: .85rem;
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .g-tile input.cap {
    width: 100%;
    background: var(--cream);
    border: 1px solid var(--line);
    padding: .5rem .65rem;
    font-size: .85rem;
    border-radius: 2px;
  }
  .g-tile .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .5rem;
  }
  .g-tile button {
    background: var(--charcoal);
    color: var(--ivory);
    border: none;
    padding: .35rem .65rem;
    cursor: pointer;
    font-size: .75rem;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .g-tile button.danger { background: transparent; color: #8b3a36; padding: .35rem; }
  .g-tile button.danger:hover { color: #5d2622; }
  .g-tile button:hover { background: var(--rose-deep); }
  .g-tile button.danger:hover { background: transparent; }
  .g-tile label { font-size: .75rem; color: var(--muted); display: flex; align-items: center; gap: .35rem; cursor: pointer; }
  .g-tile .arrows { display: flex; gap: .25rem; }
  .g-tile .arrows button { padding: .25rem .5rem; }

  .upload-progress {
    margin-top: 1rem;
    padding: .75rem 1rem;
    background: var(--cream);
    border-radius: 4px;
    font-size: .9rem;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="admin-shell">
  <header class="admin-header">
    <h1>CM · Admin</h1>
    <div style="display:flex; gap:.75rem; align-items:center;">
      <a href="/" style="color:rgba(255,250,243,0.7); font-size:.85rem;">View site →</a>
      <button id="logoutBtn">Sign out</button>
    </div>
  </header>

  <nav class="admin-nav">
    <a href="/admin/dashboard.html">Bookings</a>
    <a href="/admin/content.html">Content</a>
    <a href="/admin/settings.html">Settings</a>
    <a href="/admin/testimonials.html">Testimonials</a>
    <a href="/admin/gallery.html" class="active">Gallery</a>
  </nav>

  <main class="admin-main">
    <div class="admin-card">
      <h2>Gallery</h2>
      <p style="color: var(--muted); margin: .5rem 0 1.5rem; font-size: .95rem;">
        Once you upload your first image, the public gallery switches from the seeded sample photos to your uploads.
        JPEG, PNG, WebP, or AVIF. Max 8 MB per file. Resize before uploading for best performance.
      </p>

      <label class="uploader" id="dropzone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/avif" multiple />
        <p><strong>Click to choose files</strong> or drag &amp; drop here</p>
        <p style="font-size:.8rem;">You can upload multiple images at once.</p>
      </label>
      <div id="progress" class="upload-progress" style="display:none;"></div>

      <div id="grid" class="gallery-admin-grid">
        <p class="empty-state">Loading...</p>
      </div>
    </div>
  </main>
</div>

<script>
(function () {
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const grid = document.getElementById('grid');
  const progress = document.getElementById('progress');
  const logoutBtn = document.getElementById('logoutBtn');

  let items = [];

  function escAttr(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function load() {
    const res = await fetch('/api/admin/gallery');
    if (res.status === 401) { location.href = '/admin/'; return; }
    const out = await res.json();
    if (!out.ok) { grid.innerHTML = '<p class="empty-state">Could not load gallery: ' + escAttr(out.error || '') + '</p>'; return; }
    items = out.items;
    render();
  }

  function render() {
    if (!items.length) {
      grid.innerHTML = '<p class="empty-state">No images yet. Upload above to get started — until then the public site shows the 5 default sample photos.</p>';
      return;
    }
    grid.innerHTML = items.map((it, idx) => `
      <div class="g-tile" data-id="${escAttr(it.id)}">
        <div class="thumb" style="background-image:url('${escAttr(it.url)}');">
          <span class="order">#${idx + 1}</span>
        </div>
        <div class="meta">
          <input class="cap" type="text" placeholder="Optional caption (alt text)" value="${escAttr(it.caption)}" />
          <div class="row">
            <label><input type="checkbox" class="vis" ${it.visible ? 'checked' : ''}/> Visible</label>
            <div class="arrows">
              <button class="up" title="Move up" ${idx === 0 ? 'disabled style="opacity:.4;cursor:default;"' : ''}>↑</button>
              <button class="down" title="Move down" ${idx === items.length - 1 ? 'disabled style="opacity:.4;cursor:default;"' : ''}>↓</button>
            </div>
          </div>
          <div class="row">
            <button class="save">Save caption</button>
            <button class="danger del" title="Delete">Delete</button>
          </div>
        </div>
      </div>
    `).join('');
    bind();
  }

  function bind() {
    grid.querySelectorAll('.g-tile').forEach((tile) => {
      const id = tile.getAttribute('data-id');
      const cap = tile.querySelector('.cap');
      const vis = tile.querySelector('.vis');

      tile.querySelector('.save').addEventListener('click', async () => {
        const res = await fetch('/api/admin/gallery?id=' + encodeURIComponent(id), {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ caption: cap.value })
        });
        if (!res.ok) alert('Save failed.');
      });

      vis.addEventListener('change', async () => {
        const res = await fetch('/api/admin/gallery?id=' + encodeURIComponent(id), {
          method: 'PATCH', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ visible: vis.checked })
        });
        if (!res.ok) { vis.checked = !vis.checked; alert('Update failed.'); }
      });

      tile.querySelector('.del').addEventListener('click', async () => {
        if (!confirm('Delete this image? This cannot be undone.')) return;
        const res = await fetch('/api/admin/gallery?id=' + encodeURIComponent(id), { method: 'DELETE' });
        if (res.ok) await load(); else alert('Delete failed.');
      });

      tile.querySelector('.up').addEventListener('click', async () => {
        const idx = items.findIndex(i => i.id === id);
        if (idx <= 0) return;
        await swap(items[idx], items[idx - 1]);
      });
      tile.querySelector('.down').addEventListener('click', async () => {
        const idx = items.findIndex(i => i.id === id);
        if (idx === -1 || idx >= items.length - 1) return;
        await swap(items[idx], items[idx + 1]);
      });
    });
  }

  async function swap(a, b) {
    const ao = a.display_order;
    const bo = b.display_order;
    await Promise.all([
      fetch('/api/admin/gallery?id=' + encodeURIComponent(a.id), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display_order: bo })
      }),
      fetch('/api/admin/gallery?id=' + encodeURIComponent(b.id), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display_order: ao })
      })
    ]);
    await load();
  }

  async function uploadFiles(fileList) {
    const files = Array.from(fileList);
    if (!files.length) return;

    progress.style.display = 'block';
    let done = 0; let failed = 0;
    progress.textContent = `Uploading 0 / ${files.length}...`;

    for (const file of files) {
      const fd = new FormData();
      fd.append('file', file, file.name);
      try {
        const res = await fetch('/api/admin/gallery', { method: 'POST', body: fd });
        if (res.ok) { done++; }
        else { failed++; const out = await res.json().catch(() => ({})); console.warn('Upload fail:', file.name, out); }
      } catch { failed++; }
      progress.textContent = `Uploading ${done + failed} / ${files.length}...${failed ? ' (' + failed + ' failed)' : ''}`;
    }

    progress.textContent = `Uploaded ${done} of ${files.length}${failed ? ' — ' + failed + ' failed' : ''}.`;
    setTimeout(() => { progress.style.display = 'none'; }, 4000);
    fileInput.value = '';
    await load();
  }

  fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

  ['dragenter', 'dragover'].forEach((ev) => dropzone.addEventListener(ev, (e) => {
    e.preventDefault(); dropzone.classList.add('drag');
  }));
  ['dragleave', 'drop'].forEach((ev) => dropzone.addEventListener(ev, (e) => {
    e.preventDefault(); dropzone.classList.remove('drag');
  }));
  dropzone.addEventListener('drop', (e) => {
    if (e.dataTransfer?.files) uploadFiles(e.dataTransfer.files);
  });

  logoutBtn.addEventListener('click', async () => {
    await fetch('/api/admin/logout', { method: 'POST' });
    location.href = '/admin/';
  });

  load();
})();
</script>
</body>
</html>
